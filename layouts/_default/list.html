{{ define "title" }}{{ .Title }}{{ end }}

{{ define "main" }}

<h2>{{ .Title }}</h2>

{{ range .Pages }}

  <article>
    <header>
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
      <div>
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      {{ if .Params.subtitle }}
      <p>— {{ .Params.subtitle }}</p>
      {{ end }}
      </div>
    </header>
  </article>

{{ end }}

{{ end }}
